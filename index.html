<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC com Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
   <div id="telaAutenticacao" class="d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
            <form id="formAuth">
                <h2 class="text-center mb-4 text-primary" id="tituloAutenticacao">Fazer Login</h2>
                
                <div class="mb-3">
                    <input type="email" id="email" class="form-control" placeholder="Seu E-mail" required>
                </div>
                
                <div class="mb-4 input-group">
                    <input type="password" id="senha" class="form-control" placeholder="Senha (mín. 6 caracteres)" minlength="6" required>
                    <button class="btn btn-outline-secondary" type="button" id="btnOlhinho">👁️</button>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3" id="btnAcao">Entrar</button>
                
                <p class="text-center text-muted mb-0">
                    <a href="#" id="linkTrocarModo" class="text-decoration-none fw-bold">Não tem conta? Cadastre-se</a>
                </p>
            </form>
        </div>
   </div>

   <div id="telaCalculadora" class="d-none justify-content-center align-items-center vh-100">
        <div class="card shadow p-4" style="width: 100%; max-width: 500px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fs-4 mb-0 text-primary">Calculadora de IMC</h3>
                <button id="btnSair" class="btn btn-sm btn-outline-danger">Sair da Conta</button>
            </div>
            
            <form>
                <div class="mb-3">
                    <label for="peso" class="form-label text-muted small">Peso (kg)</label>
                    <input type="number" id="peso" class="form-control" placeholder="Ex: 70.5" step="0.1" required>
                </div>
                <div class="mb-4">
                    <label for="altura" class="form-label text-muted small">Altura (metros)</label>
                    <input type="number" id="altura" class="form-control" placeholder="Ex: 1.75" step="0.01" required>
                </div>
                
                <div id="resultadoImc" class="alert d-none text-center fw-bold mt-3" role="alert"></div>
                
                <div class="d-flex justify-content-center gap-2 mt-3">
                    <button type="button" class="btn btn-primary w-50" onclick="calcularIMC()">Calcular IMC</button>
                    <button type="button" class="btn btn-secondary w-50" onclick="limparIMC()">Limpar</button>
                </div>
            </form>
        </div>
   </div>

   <script type="module" src="/src/main.js"></script>
</body>
</html>
