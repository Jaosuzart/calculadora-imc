<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Calculadora de IMC com IA e Login - Descubra seu Índice de Massa Corporal, receba dicas personalizadas e acompanhe sua saúde de forma simples e eficaz."
    />
    <meta name="theme-color" content="#0d6efd" />

    <meta property="og:title" content="Calculadora de IMC com IA" />
    <meta
      property="og:description"
      content="Acompanhe seu peso e receba dicas de saúde geradas por Inteligência Artificial."
    />
    <meta
      property="og:image"
      content="https://cdn-icons-png.flaticon.com/512/3048/3048122.png"
    />
    <meta property="og:type" content="website" />

    <title>Calculadora de IMC com IA e Login</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://uzijrunggkwwjdoxujww.supabase.co" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/estilo.css" />
  </head>

  <body class="bg-light">
    <main>
      
      <div
        id="telaLanding"
        class="d-flex flex-column justify-content-center align-items-center vh-100 text-center px-3"
      >
        <h1 class="display-4 fw-bold text-primary mb-3">
          Calculadora de IMC com IA
        </h1>
        <p class="lead text-muted mb-4" style="color: #495057; max-width: 600px">
          Descubra se o seu peso está ideal, acompanhe sua saúde de forma simples
          e receba dicas exclusivas geradas por Inteligência Artificial.
        </p>
        <div class="d-flex gap-3">
          <button
            id="btnIrParaLogin"
            class="btn btn-primary btn-lg px-4 shadow-sm"
          >
            Fazer Login
          </button>
          <button
            id="btnIrParaCadastro"
            class="btn btn-primary btn-lg px-4 shadow-sm"
          >
            Criar Conta Grátis
          </button>
        </div>
      </div>

      <div
        id="telaAutenticacao"
        class="d-none justify-content-center align-items-center vh-100"
      >
        <div class="card shadow p-4" style="width: 100%; max-width: 400px">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <button
              id="btnVoltarInicio"
              class="btn btn-sm btn-light"
              aria-label="Voltar para a tela inicial"
            >
              ⬅ Voltar
            </button>
            <h2
              class="text-center text-primary mb-0 m-auto"
              id="tituloAutenticacao"
            >
              Fazer Login
            </h2>
          </div>

          <button
            class="btn btn-danger w-100 fw-bold d-flex align-items-center justify-content-center mb-3"
            id="btnGoogle"
          >
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
              alt="Google Logo"
              width="20"
              height="20"
              class="me-2 bg-white rounded-circle p-1"
            />
            Entrar com Google
          </button>

          <div class="d-flex align-items-center mb-3">
            <hr class="flex-grow-1" />
            <span class="mx-2 text-muted small">OU</span>
            <hr class="flex-grow-1" />
          </div>

          <form id="formAuth">
            <div class="mb-3">
              <label for="email" class="visually-hidden">Seu E-mail</label>
              <input
                type="email"
                id="email"
                class="form-control"
                placeholder="Seu E-mail"
                required
              />
            </div>

            <div class="mb-4 input-group">
              <label for="senha" class="visually-hidden">Sua Senha</label>
              <input
                type="password"
                id="senha"
                class="form-control"
                placeholder="Senha (mín. 6 caracteres)"
                minlength="6"
                required
              />
              <button
                class="btn btn-outline-secondary"
                type="button"
                id="btnOlhinho"
                aria-label="Mostrar senha"
              >
                👁️
              </button>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3" id="btnAcao">
              Entrar
            </button>

            <p class="text-center text-muted mb-0">
              <a href="#" id="linkTrocarModo" class="text-decoration-none fw-bold"
                >Não tem conta? Cadastre-se</a
              >
            </p>
          </form>
        </div>
      </div>

      <div
        id="telaCalculadora"
        class="d-none justify-content-center align-items-center min-vh-100 py-4"
      >
        <div class="card shadow p-4" style="width: 100%; max-width: 500px">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fs-4 mb-0 text-primary">Calculadora de IMC</h3>
            <button id="btnSair" class="btn btn-sm btn-outline-danger">
              Sair da Conta
            </button>
          </div>

          <form id="formCalculadora">
            <div class="row mb-3">
              <div class="col-6">
                <label for="idade" class="form-label text-muted small"
                  >Idade</label
                >
                <input
                  type="number"
                  id="idade"
                  class="form-control"
                  placeholder="Ex: 30"
                  required
                />
              </div>
              <div class="col-6">
                <label for="genero" class="form-label text-muted small"
                  >Gênero</label
                >
                <select id="genero" class="form-select" required>
                  <option value="masculino">Masculino</option>
                  <option value="feminino">Feminino</option>
                </select>
              </div>
            </div>
            <div class="col-12 mb-3">
              <label for="personaIA" class="form-label text-muted small fw-bold"
                >🧠 Personalidade da IA</label
              >
              <select id="personaIA" class="form-select border-primary" required>
                <option value="amigavel">🤗 Amigável e Gentil</option>
                <option value="treinador">💪 Treinador Motivacional</option>
                <option value="medico">🩺 Médico e Científico</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="peso" class="form-label text-muted small"
                >Peso (kg)</label
              >
              <input
                type="number"
                id="peso"
                class="form-control"
                placeholder="Ex: 70.5"
                step="0.1"
                required
              />
            </div>
            <div class="mb-4">
              <label for="altura" class="form-label text-muted small"
                >Altura (metros)</label
              >
              <input
                type="number"
                id="altura"
                class="form-control"
                placeholder="Ex: 1.75"
                step="0.01"
                required
              />
            </div>
            <div class="mb-4 border-top pt-3 mt-3">
              <label for="metaPeso" class="form-label text-muted small fw-bold"
                >🎯 Qual o seu peso meta? (Opcional)</label
              >
              <input
                type="number"
                id="metaPeso"
                class="form-control border-primary"
                placeholder="Ex: 65.0"
                step="0.1"
              />
            </div>

            <div
              id="resultadoImc"
              class="alert d-none text-center fw-bold mt-3"
              role="alert"
            ></div>

            <div
              id="containerEscalaImc"
              class="imc-scale-container d-none mt-4 mb-4"
            >
              <div id="marcadorImc" class="imc-marker">0.0</div>
              <div class="imc-bar">
                <div class="segment abaixopeso" title="Abaixo do peso"></div>
                <div class="segment normal" title="Normal"></div>
                <div class="segment sobrepeso" title="Sobrepeso"></div>
                <div class="segment obesidade" title="Obesidade"></div>
              </div>
            </div>

            <div id="feedbackIA" class="mt-3 d-none text-start"></div>

            <div class="d-flex justify-content-center gap-2 mt-4">
              <button
                type="button"
                class="btn btn-primary w-50"
                onclick="calcularIMC()"
              >
                Calcular IMC
              </button>
              <button
                type="button"
                class="btn btn-secondary w-50"
                onclick="limparIMC()"
              >
                Limpar
              </button>
            </div>
            
            <div id="areaHistorico" class="mt-5 pt-4 border-top d-none">
              <h6 class="text-center text-muted mb-3 fw-bold">📈 Sua Evolução</h6>
              <canvas id="graficoHistorico" height="150"></canvas>
            </div>
          </form>
        </div>
      </div>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
